name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@a264ff9f02fe581c9241fc238d6e36d56dc71add # v2.0.0
    permissions:
      contents: write
      pull-requests: write
      checks: write
