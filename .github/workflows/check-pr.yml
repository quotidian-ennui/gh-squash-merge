name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@ba459193955c8bc8339e4fa8e3a135530b6917ff # v2.2.0
    permissions:
      contents: write
      pull-requests: write
      checks: write
