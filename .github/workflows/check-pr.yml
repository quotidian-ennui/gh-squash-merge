name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@fbf6d0730e3cd74f770b6a6d1e9a105c1a681d83 # v2.2.2
    permissions:
      contents: write
      pull-requests: write
      checks: write
