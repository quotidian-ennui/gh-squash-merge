name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@e4f9097452700ded33b9cc2f9e69f71a12d43605 # v2.0.1
    permissions:
      contents: write
      pull-requests: write
      checks: write
