name: dependabot-merge
run-name: Merge dependabot-pr (${{ github.event.client_payload.detail.pull_request }})
on:
  repository_dispatch:
    types:
      - dependabot-merge

permissions: {}

# A push via dependabot basically means that the github actions
# have been upgraded;
jobs:
  actions_merge:
    uses: quotidian-ennui/workflows-olio/.github/workflows/action-dependabot-merge.yml@290daed67f03ed2f2502eee057f35e61327b1bef # v1.0.0
    secrets: inherit
